<body>
    <div>

    <div>
        <br/>
        <b>Bài 2:</b>Tạo form đặt phòng khách sạn <br/>
        <b>Booking Form</b>
        <br/>
        <form action="" method="get">
            <label for="name">Name:</label>
            <input type="text" name="Name" id="name">
            <br/>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email">
            <br/>
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone">
            <br/>
            <label for="date">Date:</label>
            <input type="date" name="date" id="date">
            <br/>
            <label for="time">Time:</label>
            <input type="time" name="time" id="time">
            <br/>
            <label for="number of guests">Number of Guests</label>
            <input type="number" name="number of guests" id="number of guests">
            <br/>
            <button type="submit">Submit</button>
        </form>
    </div>

    <div>
        <br/>
        <b>Bài 3:</b>Tạo form mua xe
        <br/>
        <b>Car Purchase Form</b>
        <br/>
        <form action="" method="get">
            <label for="name">Name:</label>
            <input type="text" name="Name" id="name">
            <br/>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email">
            <br/>
            <label for="phone">Phone:</label>
            <input type="tel" name="phone" id="phone">
            <br/>
            <label for="model">Choose a Car:</label>
            <select name="model" id="model">
                <option value="model 1">Model 1</option>
                <option value="model 2">Model 2</option>
                <option value="model 3">Model 3</option>
            </select>
            <br/>
            <label for="color">Choose a Color:</label>
            <select name="color" id="color">
                <option value="red">Red</option>
                <option value="black">Black</option>
                <option value="white">White</option>
            </select>
            <br/>
            <label for="quantity">Quantity:</label>
            <input type="number" name="quantity" id="quantity">
            <br/>
            <label for="delivery date">Delivery Date:</label>
            <input type="date" name="delivery date" id="delivery date">
            <br/>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
