<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 7</title>
</head>
<body>
    <h2>Sở thích của bạn</h2>
    <form action="mysever.com" method="get">
        <label for="name">Họ và Tên</label>
        <input type="text" name="name" id="name">
        <br/>
        <label for="email">Email</label>
        <input type="email" name="email" id="email">
        <br/>
        <label for="hobby">Sở thích</label>
        <input type="checkbox" name="hobbies" value="sport"> Thể thao
        <input type="checkbox" name="hobbies" value="music"> Âm nhạc
        <input type="checkbox" name="hobbies" value="reading"> Đọc sách
        <br/>
        <input type="checkbox" name="hobbies" value="browsing the web"> Lướt web
        <input type="checkbox" name="hobbies" value="game"> Chơi game
        <input type="checkbox" name="hobbies" value="cinema"> Điện ảnh
        <br/>
        <input type="checkbox" name="hobbies" value="travelling"> Du lịch
        <br/>
        <button type="submit">Gửi thông tin</button>
        <button type="reset">Nhập lại</button>
    </form>
</body>
</html>
